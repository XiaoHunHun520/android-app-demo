name: Flet Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      # 1. 基础环境：安装系统依赖
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgles2-mesa-dev libegl1-mesa-dev xorg-dev \
            libgl1-mesa-dev libgbm-dev

      # 2. 配置 JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 配置 Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-33 build-tools;33.0.2 platform-tools cmdline-tools;latest'
          accept-android-sdk-licenses: true

      - name: Set Android Environment Variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV

      # 4. 配置 Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # 5. 配置 Flutter（升级到 3.38.7）
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.38.7'

      # 6. 安装 Python 依赖
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.80.5
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 7. 检查 flet.yaml
      - name: Check flet.yaml
        run: |
          if [ ! -f flet.yaml ]; then
            echo "ERROR: flet.yaml 不存在！"
            exit 1
          fi
          echo "=== flet.yaml 内容 ==="
          cat flet.yaml

      # 8. 执行打包（添加 --yes 参数）
      - name: Build APK
        run: |
          echo "=== 环境信息 ==="
          echo "当前目录：$(pwd)"
          echo "Python Version: $(python --version)"
          echo "Flet Version: $(pip show flet | grep Version)"
          echo "Flutter Version: $(flutter --version)"
          
          if [ ! -f flet.yaml ]; then
            echo "ERROR: flet.yaml 不存在！"
            exit 1
          fi
          
          yes | sdkmanager --licenses || true
          
          # 使用 --yes 参数跳过交互确认
          flet build apk --yes

      # 9. 查找并上传 APK
      - name: Find APK
        run: |
          echo "=== 查找 APK 文件 ==="
          find . -name "*.apk" -type f -ls
          mkdir -p build_output
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "找到 APK: $APK_PATH"
            cp "$APK_PATH" build_output/
            ls -la build_output/
          else
            echo "ERROR: 未找到 APK 文件！"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: android-app-${{ github.sha }}
          path: build_output/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: build-log
          path: .

      # 10. 设置 Gradle 内存
      - name: Set Gradle Memory
        run: |
          echo "GRADLE_OPTS=-Xmx4g -XX:MaxMetaspaceSize=1g" >> $GITHUB_ENV