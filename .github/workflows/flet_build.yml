name: Ultimate Android Build 2026

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 基础环境：安装 Linux 缺失的编译支持库
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgles2-mesa-dev libegl1-mesa-dev xorg-dev \
            libgl1-mesa-dev libgbm-dev
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 2. 安装 Python 依赖
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # 如果没有 requirements.txt，确保 flet 已经安装
          if [ ! -f requirements.txt ]; then echo "flet" > requirements.txt; fi

      # 3. 执行打包 (核心逻辑修改)
      - name: Build APK
        run: |
          # 加上 --accept-licenses 自动处理协议
          # 加上 --no-version-check 避免版本更新干扰
          flet build apk --verbose --output build_output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-python-app
          path: build_output/*.apk
