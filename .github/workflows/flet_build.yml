name: Flet Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      # 1. 基础环境：安装系统依赖
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgles2-mesa-dev libegl1-mesa-dev xorg-dev \
            libgl1-mesa-dev libgbm-dev

      # 2. 配置 JDK（移除 gradle 缓存）
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 配置 Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.2 platform-tools cmdline-tools;latest'
          accept-android-sdk-licenses: true

      - name: Set Android Environment Variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV

      # 4. 配置 Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 5. 配置 Flutter（使用稳定版本）
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.13.0'

      # 6. 安装 Python 依赖
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.21.0
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 7. 检查 flet.yaml 配置文件
      - name: Check flet.yaml
        run: |
          if [ ! -f flet.yaml ]; then
            echo "ERROR: flet.yaml not found! Creating default..."
            cat > flet.yaml << EOF
          app:
            name: android-app-demo
            version: 1.0.0
          flet:
            entrypoint: main.py
            android:
              package: com.example.androidappdemo
              min_sdk_version: 21
              target_sdk_version: 33
          EOF
          fi
          echo "=== flet.yaml 内容 ==="
          cat flet.yaml

      # 8. 执行打包
      - name: Build APK
        run: |
          echo "=== 环境信息 ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "Python Version: $(python --version)"
          echo "Flet Version: $(pip show flet | grep Version)"
          echo "Flutter Version: $(flutter --version)"
          
          yes | sdkmanager --licenses || true
          
          flet pack main.py --android --verbose 2>&1 | tee build.log

      # 9. 查找并上传 APK
      - name: Find APK
        run: |
          echo "=== 查找 APK 文件 ==="
          find . -name "*.apk" -type f
          mkdir -p build_output
          cp -r $(find . -name "*.apk" -type f | head -1) build_output/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app-${{ github.sha }}
          path: build_output/*.apk
          retention-days: 30

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
      
      # 10. 设置 Gradle 内存
      - name: Set Gradle Memory
        run: |
          echo "GRADLE_OPTS=-Xmx4g -XX:MaxMetaspaceSize=1g" >> $GITHUB_ENV