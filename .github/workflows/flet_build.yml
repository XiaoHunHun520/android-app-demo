name: Build Flet Android APK (Pro)

on:
  push:
    branches: [ main ]  # 仅在推送到 main 分支时触发
  workflow_dispatch:    # 允许你在 GitHub 页面手动点击按钮触发构建

# 解决你提到的 Node.js 24 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (Android 构建必需)
      # 使用 v4 版本以原生支持较新的 Node 运行环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 自动缓存 pip 依赖

      # 4. 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # 指定稳定版本，避免环境漂移
          channel: 'stable'
          cache: true # 开启 Flutter SDK 缓存

      # 5. 安装 Flet 及打包工具
      - name: Install Flet Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          # 如果你有 requirements.txt，取消下面一行的注释
          # pip install -r requirements.txt

      # 6. 执行 Flet 打包命令
      # --verbose 可以让你在 Actions 日志里看到详细进度，方便排错
      - name: Build APK
        run: |
          flet build apk --verbose --output build_output

      # 7. 整理产物并重命名 (进阶：带上时间戳或版本号)
      - name: Prepare Artifact
        run: |
          mkdir -p final_apk
          cp build_output/*.apk final_apk/myapp-$(date +'%Y%m%d').apk

      # 8. 上传 APK 到 GitHub Artifacts
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-android-package
          path: final_apk/*.apk
          retention-days: 7 # 产物保留7天，节省你的 GitHub 存储空间
